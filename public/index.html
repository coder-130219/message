<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Friends Chat</title>
<style>
  /* ============ 디자인 토큰 (라이트 테마) ============ */
  :root {
    --bg: #f6f8fa;
    --panel: #ffffff;
    --border: #e3e8ee;
    --text: #24313f;
    --text-soft: #7a8896;
    --accent: #12a594;
    --accent-soft: #e0f5f2;
    --me-bubble: #d3f0ec;
    --other-bubble: #ffffff;
    --danger: #d64545;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
                 "Hiragino Sans", "Noto Sans KR", "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  button { font-family: inherit; cursor: pointer; }
  input { font-family: inherit; }

  /* ============ 로그인 화면 ============ */
  #login {
    position: fixed; inset: 0; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(160deg, #eefaf8 0%, var(--bg) 60%);
    padding: 20px;
  }
  .login-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 32px;
    width: 100%; max-width: 380px;
    box-shadow: 0 12px 40px rgba(18, 165, 148, 0.10);
  }
  .logo { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
  .logo span { color: var(--accent); }
  .login-sub { color: var(--text-soft); font-size: 14px; margin-bottom: 24px; }
  .login-card label {
    display: block; font-size: 13px; font-weight: 600;
    color: var(--text-soft); margin: 14px 0 6px;
  }
  .login-card input {
    width: 100%; padding: 12px 14px; font-size: 16px;
    border: 1.5px solid var(--border); border-radius: var(--radius);
    outline: none; background: #fbfcfd;
  }
  .login-card input:focus { border-color: var(--accent); background: #fff; }
  #joinBtn {
    width: 100%; margin-top: 22px; padding: 13px;
    font-size: 16px; font-weight: 700; color: #fff;
    background: var(--accent); border: none; border-radius: var(--radius);
  }
  #joinBtn:active { transform: scale(0.98); }
  #loginError {
    color: var(--danger); font-size: 13px; margin-top: 12px;
    min-height: 18px; text-align: center;
  }

  /* 언어 선택 칩 */
  .lang-chips { display: flex; gap: 8px; }
  .lang-chips button {
    padding: 5px 12px; font-size: 13px; font-weight: 600;
    border: 1.5px solid var(--border); border-radius: 999px;
    background: var(--panel); color: var(--text-soft);
  }
  .lang-chips button.active {
    background: var(--accent-soft); border-color: var(--accent); color: var(--accent);
  }
  #login .lang-chips { justify-content: center; margin-bottom: 22px; }

  /* ============ 채팅 화면 ============ */
  #chat { display: none; height: 100dvh; }
  #chat.show { display: flex; }

  #sidebar {
    width: 230px; flex-shrink: 0;
    background: var(--panel); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; padding: 18px 12px;
    overflow-y: auto;
  }
  #sidebar .logo { font-size: 20px; padding: 0 8px 14px; }
  .side-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--text-soft); padding: 12px 8px 6px;
  }
  .side-btn {
    display: flex; align-items: center; gap: 8px;
    width: 100%; text-align: left;
    padding: 9px 12px; margin: 2px 0;
    font-size: 15px; font-weight: 600;
    border: none; border-radius: 10px;
    background: transparent; color: var(--text-soft);
  }
  .side-btn.active { background: var(--accent-soft); color: var(--accent); }
  .side-btn .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #38c172; flex-shrink: 0;
  }
  .side-btn .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .badge {
    background: var(--danger); color: #fff;
    font-size: 11px; font-weight: 700;
    min-width: 18px; height: 18px; padding: 0 5px;
    border-radius: 999px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .empty-note { font-size: 13px; color: var(--text-soft); padding: 4px 12px; }

  /* 메인 영역 */
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #topbar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px;
    padding: 14px 20px; background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  #channelTitle { font-size: 17px; font-weight: 700; flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #callBtn {
    display: none;
    padding: 7px 16px; font-size: 14px; font-weight: 700;
    color: #fff; background: var(--accent);
    border: none; border-radius: 999px;
    flex-shrink: 0;
  }
  #callBtn.show { display: block; }

  /* ---- 통화 상태 바 ---- */
  #callBar {
    display: none;
    align-items: center; justify-content: space-between; gap: 10px;
    padding: 10px 20px;
    background: var(--accent-soft);
    border-bottom: 1px solid #bfe6e0;
  }
  #callBar.show { display: flex; }
  #callStatus { font-size: 14px; font-weight: 600; color: var(--accent); }
  #callTimer { font-variant-numeric: tabular-nums; }
  #hangupBtn {
    padding: 7px 16px; font-size: 14px; font-weight: 700;
    color: #fff; background: var(--danger);
    border: none; border-radius: 999px;
  }

  /* ---- 수신 배너 ---- */
  #incomingBar {
    display: none;
    position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
    z-index: 20;
    align-items: center; gap: 14px;
    padding: 14px 20px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 18px;
    box-shadow: 0 10px 34px rgba(36, 49, 63, 0.18);
    max-width: calc(100% - 28px);
  }
  #incomingBar.show { display: flex; animation: ringPulse 1.2s ease-in-out infinite; }
  @keyframes ringPulse {
    0%, 100% { box-shadow: 0 10px 34px rgba(36, 49, 63, 0.18); }
    50% { box-shadow: 0 10px 34px rgba(18, 165, 148, 0.35); }
  }
  @media (prefers-reduced-motion: reduce) {
    #incomingBar.show { animation: none; }
  }
  #incomingText { font-size: 15px; font-weight: 600; }
  #acceptBtn, #declineBtn {
    padding: 9px 18px; font-size: 14px; font-weight: 700;
    color: #fff; border: none; border-radius: 999px;
    flex-shrink: 0;
  }
  #acceptBtn { background: #38c172; }
  #declineBtn { background: var(--danger); }

  #messages {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .msg { display: flex; gap: 10px; max-width: 78%; }
  .msg.me { align-self: flex-end; flex-direction: row-reverse; }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; font-size: 15px;
  }
  .bubble-wrap { display: flex; flex-direction: column; gap: 3px; }
  .msg.me .bubble-wrap { align-items: flex-end; }
  .meta { font-size: 12px; color: var(--text-soft); padding: 0 4px; }
  .meta b { color: var(--text); font-size: 13px; margin-right: 6px; }
  .bubble {
    padding: 9px 14px; font-size: 15px; line-height: 1.45;
    background: var(--other-bubble); border: 1px solid var(--border);
    border-radius: 4px 16px 16px 16px;
    white-space: pre-wrap; word-break: break-word;
  }
  .msg.me .bubble {
    background: var(--me-bubble); border-color: #bfe6e0;
    border-radius: 16px 4px 16px 16px;
  }
  .system-msg {
    align-self: center; font-size: 12.5px; color: var(--text-soft);
    background: #eef1f4; padding: 4px 14px; border-radius: 999px;
  }

  #inputBar {
    display: flex; gap: 10px; padding: 14px 20px 18px;
    background: var(--panel); border-top: 1px solid var(--border);
  }
  #msgInput {
    flex: 1; padding: 12px 16px; font-size: 16px;
    border: 1.5px solid var(--border); border-radius: 999px;
    outline: none; background: #fbfcfd;
  }
  #msgInput:focus { border-color: var(--accent); background: #fff; }
  #sendBtn {
    padding: 0 22px; font-size: 15px; font-weight: 700;
    color: #fff; background: var(--accent);
    border: none; border-radius: 999px;
  }
  #sendBtn:active { transform: scale(0.96); }

  /* ============ 모바일 ============ */
  @media (max-width: 640px) {
    #chat.show { flex-direction: column; }
    #sidebar {
      width: 100%; flex-direction: row; align-items: center;
      padding: 8px 10px; gap: 6px;
      overflow-x: auto; overflow-y: hidden;
      border-right: none; border-bottom: 1px solid var(--border);
    }
    #sidebar .logo, .side-title, .empty-note { display: none; }
    #channelList, #dmList { display: flex; gap: 6px; }
    .side-btn { width: auto; white-space: nowrap; }
    .msg { max-width: 88%; }
  }
</style>
</head>
<body>

<!-- ============ 로그인 화면 ============ -->
<div id="login">
  <div class="login-card">
    <div class="lang-chips" id="langChipsLogin"></div>
    <div class="logo">Friends<span>Chat</span></div>
    <p class="login-sub" data-i18n="subtitle"></p>
    <label data-i18n="nickname"></label>
    <input id="nickInput" maxlength="20" autocomplete="off" />
    <label data-i18n="password"></label>
    <input id="passInput" type="password" autocomplete="off" />
    <button id="joinBtn" data-i18n="enter"></button>
    <div id="loginError"></div>
  </div>
</div>

<!-- ============ 전화 수신 배너 ============ -->
<div id="incomingBar">
  <span style="font-size:22px">📞</span>
  <span id="incomingText"></span>
  <button id="acceptBtn" data-i18n="accept"></button>
  <button id="declineBtn" data-i18n="decline"></button>
</div>

<!-- ============ 채팅 화면 ============ -->
<div id="chat">
  <aside id="sidebar">
    <div class="logo">Friends<span style="color:var(--accent)">Chat</span></div>
    <div class="side-title" data-i18n="channels"></div>
    <div id="channelList"></div>
    <div class="side-title" data-i18n="dm"></div>
    <div id="dmList"></div>
  </aside>

  <div id="main">
    <div id="topbar">
      <div id="channelTitle"></div>
      <button id="callBtn"></button>
      <div class="lang-chips" id="langChipsChat"></div>
    </div>
    <div id="callBar">
      <span id="callStatus"></span>
      <span style="flex:1"></span>
      <span id="callTimer"></span>
      <button id="hangupBtn" data-i18n="hangUp"></button>
    </div>
    <div id="messages"></div>
    <div id="inputBar">
      <input id="msgInput" maxlength="500" autocomplete="off" />
      <button id="sendBtn" data-i18n="send"></button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
/* ==================================================
   1. 다국어 (i18n) — 영어 / 한국어 / 일본어
================================================== */
const I18N = {
  en: {
    subtitle: "A private chat room for our friends",
    nickname: "Nickname",
    password: "Room password",
    enter: "Enter",
    channels: "Channels",
    dm: "Direct messages",
    send: "Send",
    placeholder: "Type a message...",
    noOneOnline: "No one else is online",
    call: "📞 Call",
    accept: "Accept",
    decline: "Decline",
    hangUp: "End",
    joinMsg: (n) => `${n} joined the chat`,
    leaveMsg: (n) => `${n} left the chat`,
    offlineMsg: (n) => `${n} is offline — they'll see this when they come back`,
    incoming: (n) => `${n} is calling...`,
    calling: (n) => `Calling ${n}...`,
    inCall: (n) => `In call with ${n}`,
    callEnded: "Call ended",
    callDeclined: (n) => `${n} declined the call`,
    callBusy: (n) => `${n} is on another call`,
    callOffline: (n) => `${n} is offline right now`,
    callFailed: "Couldn't connect the call — your networks may be blocking it",
    errMic: "Microphone access is needed for calls. Please allow it and try again.",
    errPassword: "Wrong password. Ask the room owner!",
    errNick: "Please enter a nickname (max 20 chars).",
    errNickTaken: "That nickname is already in use. Pick another one!",
    errConn: "Can't reach the server. Try again.",
    channelNames: { general: "general", games: "games", homework: "homework" }
  },
  ko: {
    subtitle: "우리 친구들만의 채팅방",
    nickname: "닉네임",
    password: "입장 비밀번호",
    enter: "입장하기",
    channels: "채널",
    dm: "개인 메시지",
    send: "전송",
    placeholder: "메시지를 입력하세요...",
    noOneOnline: "지금 접속한 친구가 없어요",
    call: "📞 통화",
    accept: "받기",
    decline: "거절",
    hangUp: "끊기",
    joinMsg: (n) => `${n} 님이 입장했어요`,
    leaveMsg: (n) => `${n} 님이 나갔어요`,
    offlineMsg: (n) => `${n} 님은 지금 오프라인이에요 — 다시 들어오면 볼 수 있어요`,
    incoming: (n) => `${n} 님의 전화가 왔어요`,
    calling: (n) => `${n} 님에게 전화 거는 중...`,
    inCall: (n) => `${n} 님과 통화 중`,
    callEnded: "통화가 끝났어요",
    callDeclined: (n) => `${n} 님이 전화를 거절했어요`,
    callBusy: (n) => `${n} 님은 다른 통화 중이에요`,
    callOffline: (n) => `${n} 님은 지금 오프라인이에요`,
    callFailed: "통화 연결에 실패했어요 — 네트워크가 막고 있을 수 있어요",
    errMic: "통화하려면 마이크 사용을 허용해야 해요. 허용하고 다시 시도해주세요.",
    errPassword: "비밀번호가 틀렸어요. 방장에게 물어보세요!",
    errNick: "닉네임을 입력해주세요 (최대 20자).",
    errNickTaken: "이미 사용 중인 닉네임이에요. 다른 걸로 해주세요!",
    errConn: "서버에 연결할 수 없어요. 다시 시도해주세요.",
    channelNames: { general: "일반", games: "게임", homework: "숙제" }
  },
  ja: {
    subtitle: "友だちだけのチャットルーム",
    nickname: "ニックネーム",
    password: "入室パスワード",
    enter: "入室する",
    channels: "チャンネル",
    dm: "ダイレクトメッセージ",
    send: "送信",
    placeholder: "メッセージを入力...",
    noOneOnline: "オンラインの友だちがいません",
    call: "📞 通話",
    accept: "応答",
    decline: "拒否",
    hangUp: "終了",
    joinMsg: (n) => `${n} さんが入室しました`,
    leaveMsg: (n) => `${n} さんが退室しました`,
    offlineMsg: (n) => `${n} さんはオフラインです — 戻ってきたら見られます`,
    incoming: (n) => `${n} さんから着信中...`,
    calling: (n) => `${n} さんに発信中...`,
    inCall: (n) => `${n} さんと通話中`,
    callEnded: "通話が終了しました",
    callDeclined: (n) => `${n} さんが通話を拒否しました`,
    callBusy: (n) => `${n} さんは別の通話中です`,
    callOffline: (n) => `${n} さんは今オフラインです`,
    callFailed: "通話を接続できませんでした — ネットワークがブロックしている可能性があります",
    errMic: "通話にはマイクの使用許可が必要です。許可してからもう一度お試しください。",
    errPassword: "パスワードが違います。ルームの管理者に聞いてください！",
    errNick: "ニックネームを入力してください（最大20文字）。",
    errNickTaken: "そのニックネームは使用中です。別の名前にしてください！",
    errConn: "サーバーに接続できません。もう一度お試しください。",
    channelNames: { general: "一般", games: "ゲーム", homework: "宿題" }
  }
};
const LANG_LABELS = { en: "EN", ko: "한국어", ja: "日本語" };

let lang = localStorage.getItem("chatLang");
if (!I18N[lang]) {
  const nav = (navigator.language || "en").slice(0, 2);
  lang = I18N[nav] ? nav : "en";
}
const t = () => I18N[lang];

/* ==================================================
   2. 상태
================================================== */
let socket = null;
let myNick = "";
let channels = [];
let onlineUsers = [];
let view = { type: "channel", id: "general" };
const unread = {};

/* ==================================================
   3. 화면 요소
================================================== */
const $ = (id) => document.getElementById(id);
const loginEl = $("login"), chatEl = $("chat");
const messagesEl = $("messages"), msgInput = $("msgInput");

/* ==================================================
   4. 언어 적용
================================================== */
function buildLangChips(container) {
  container.innerHTML = "";
  for (const code of Object.keys(I18N)) {
    const b = document.createElement("button");
    b.textContent = LANG_LABELS[code];
    b.className = code === lang ? "active" : "";
    b.onclick = () => { lang = code; localStorage.setItem("chatLang", code); applyLang(); };
    container.appendChild(b);
  }
}
function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll("[data-i18n]").forEach((el) => {
    el.textContent = t()[el.dataset.i18n];
  });
  msgInput.placeholder = t().placeholder;
  $("callBtn").textContent = t().call;
  buildLangChips($("langChipsLogin"));
  buildLangChips($("langChipsChat"));
  renderSidebar();
  updateTitle();
  updateCallUi();
}

/* ==================================================
   5. 사이드바 (채널 + DM 목록)
================================================== */
function channelName(ch) { return t().channelNames[ch] || ch; }
function updateTitle() {
  $("channelTitle").textContent =
    view.type === "channel" ? "# " + channelName(view.id) : "@ " + view.id;
  // 통화 버튼은 DM 화면에서만 보임
  $("callBtn").classList.toggle("show", view.type === "dm");
}

function renderSidebar() {
  const chList = $("channelList");
  chList.innerHTML = "";
  for (const ch of channels) {
    const b = document.createElement("button");
    b.className = "side-btn" + (view.type === "channel" && view.id === ch ? " active" : "");
    b.textContent = "# " + channelName(ch);
    b.onclick = () => openChannel(ch);
    chList.appendChild(b);
  }

  const dmList = $("dmList");
  dmList.innerHTML = "";
  const others = onlineUsers.filter((n) => n !== myNick);
  if (others.length === 0) {
    const p = document.createElement("div");
    p.className = "empty-note";
    p.textContent = t().noOneOnline;
    dmList.appendChild(p);
    return;
  }
  for (const n of others) {
    const b = document.createElement("button");
    b.className = "side-btn" + (view.type === "dm" && view.id === n ? " active" : "");

    const dot = document.createElement("span");
    dot.className = "dot";
    const name = document.createElement("span");
    name.className = "name";
    name.textContent = n;
    b.appendChild(dot);
    b.appendChild(name);

    if (unread[n]) {
      const badge = document.createElement("span");
      badge.className = "badge";
      badge.textContent = unread[n] > 9 ? "9+" : unread[n];
      b.appendChild(badge);
    }
    b.onclick = () => openDm(n);
    dmList.appendChild(b);
  }
}

/* ==================================================
   6. 채널 / DM 열기
================================================== */
function openChannel(ch) {
  if (view.type === "channel" && view.id === ch) return;
  socket.emit("switchChannel", ch, (res) => {
    view = { type: "channel", id: ch };
    messagesEl.innerHTML = "";
    res.history.forEach((m) => addMessage(m.nick, m.text, m.time));
    renderSidebar();
    updateTitle();
  });
}

function openDm(other) {
  socket.emit("openDm", other, (res) => {
    view = { type: "dm", id: other };
    unread[other] = 0;
    messagesEl.innerHTML = "";
    res.history.forEach((m) => addMessage(m.from, m.text, m.time));
    renderSidebar();
    updateTitle();
    msgInput.focus();
  });
}

/* ==================================================
   7. 메시지 그리기 (textContent 사용 → XSS 방지)
================================================== */
function avatarColor(nick) {
  let h = 0;
  for (const c of nick) h = (h * 31 + c.charCodeAt(0)) % 360;
  return `hsl(${h}, 55%, 55%)`;
}
function addMessage(nick, text, time) {
  const div = document.createElement("div");
  div.className = "msg" + (nick === myNick ? " me" : "");

  const av = document.createElement("div");
  av.className = "avatar";
  av.style.background = avatarColor(nick);
  av.textContent = nick[0].toUpperCase();

  const wrap = document.createElement("div");
  wrap.className = "bubble-wrap";

  const meta = document.createElement("div");
  meta.className = "meta";
  const name = document.createElement("b");
  name.textContent = nick;
  const timeStr = new Date(time).toLocaleTimeString(lang, { hour: "2-digit", minute: "2-digit" });
  meta.appendChild(name);
  meta.appendChild(document.createTextNode(timeStr));

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = text;

  wrap.appendChild(meta);
  wrap.appendChild(bubble);
  div.appendChild(av);
  div.appendChild(wrap);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function addSystem(text) {
  const div = document.createElement("div");
  div.className = "system-msg";
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

/* ==================================================
   8. 음성 통화 (WebRTC)
   목소리는 친구 기기끼리 직접 연결되고,
   서버는 연결 신호만 전달해요.
================================================== */
let pc = null;             // WebRTC 연결
let localStream = null;    // 내 마이크
let callPeer = null;       // 통화 상대 닉네임
let callState = "idle";    // idle | calling | ringing | incall
let pendingOffer = null;   // 수신 대기 중인 offer
let pendingIce = [];       // 아직 처리 못 한 ICE 후보들
let callTimerId = null, callStartTime = 0;

const remoteAudio = new Audio();
remoteAudio.autoplay = true;

const RTC_CONFIG = {
  iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
};

function updateCallUi() {
  const bar = $("callBar");
  if (callState === "calling") {
    bar.classList.add("show");
    $("callStatus").textContent = t().calling(callPeer);
    $("callTimer").textContent = "";
  } else if (callState === "incall") {
    bar.classList.add("show");
    $("callStatus").textContent = t().inCall(callPeer);
  } else {
    bar.classList.remove("show");
  }
  if (callState === "ringing" && callPeer) {
    $("incomingText").textContent = t().incoming(callPeer);
    $("incomingBar").classList.add("show");
  } else {
    $("incomingBar").classList.remove("show");
  }
}

function startCallTimer() {
  callStartTime = Date.now();
  callTimerId = setInterval(() => {
    const s = Math.floor((Date.now() - callStartTime) / 1000);
    const mm = String(Math.floor(s / 60)).padStart(2, "0");
    const ss = String(s % 60).padStart(2, "0");
    $("callTimer").textContent = mm + ":" + ss;
  }, 500);
}

function createPeerConnection() {
  pc = new RTCPeerConnection(RTC_CONFIG);
  pc.onicecandidate = (e) => {
    if (e.candidate) socket.emit("call:ice", { to: callPeer, candidate: e.candidate });
  };
  pc.ontrack = (e) => {
    remoteAudio.srcObject = e.streams[0];
    remoteAudio.play().catch(() => {});
  };
  pc.onconnectionstatechange = () => {
    if (pc && (pc.connectionState === "failed")) {
      addSystem(t().callFailed);
      endCall(true);
    } else if (pc && pc.connectionState === "disconnected") {
      endCall(false);
      addSystem(t().callEnded);
    }
  };
}

async function getMic() {
  try {
    return await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch {
    addSystem(t().errMic);
    return null;
  }
}

// ---- 전화 걸기 ----
async function startCall() {
  if (callState !== "idle" || view.type !== "dm") return;
  const stream = await getMic();
  if (!stream) return;

  localStream = stream;
  callPeer = view.id;
  callState = "calling";
  updateCallUi();

  createPeerConnection();
  localStream.getTracks().forEach((tr) => pc.addTrack(tr, localStream));
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  socket.emit("call:offer", { to: callPeer, sdp: offer });
}

// ---- 전화 받기 ----
async function acceptCall() {
  if (callState !== "ringing" || !pendingOffer) return;
  const stream = await getMic();
  if (!stream) { declineCall(); return; }

  localStream = stream;
  callState = "incall";
  updateCallUi();
  startCallTimer();

  createPeerConnection();
  localStream.getTracks().forEach((tr) => pc.addTrack(tr, localStream));
  await pc.setRemoteDescription(new RTCSessionDescription(pendingOffer));
  pendingOffer = null;

  // 대기 중이던 ICE 후보 처리
  for (const c of pendingIce) {
    try { await pc.addIceCandidate(new RTCIceCandidate(c)); } catch {}
  }
  pendingIce = [];

  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  socket.emit("call:answer", { to: callPeer, sdp: answer });
}

function declineCall() {
  if (callState !== "ringing") return;
  socket.emit("call:decline", { to: callPeer });
  cleanupCall();
}

// ---- 끊기 / 정리 ----
function endCall(silent) {
  if (callState === "idle") return;
  socket.emit("call:end", { to: callPeer });
  cleanupCall();
  if (!silent) addSystem(t().callEnded);
}
function cleanupCall() {
  if (callTimerId) { clearInterval(callTimerId); callTimerId = null; }
  if (localStream) { localStream.getTracks().forEach((tr) => tr.stop()); localStream = null; }
  if (pc) { pc.onconnectionstatechange = null; pc.close(); pc = null; }
  remoteAudio.srcObject = null;
  callPeer = null; callState = "idle";
  pendingOffer = null; pendingIce = [];
  updateCallUi();
}

$("callBtn").onclick = startCall;
$("hangupBtn").onclick = () => endCall(false);
$("acceptBtn").onclick = acceptCall;
$("declineBtn").onclick = declineCall;

/* ==================================================
   9. 입장 / 소켓 이벤트
================================================== */
$("joinBtn").onclick = join;
$("passInput").addEventListener("keydown", (e) => { if (e.key === "Enter") join(); });

function join() {
  const nick = $("nickInput").value.trim();
  const password = $("passInput").value;
  if (!nick) { $("loginError").textContent = t().errNick; return; }

  if (!socket) {
    socket = io();

    socket.on("message", (m) => {
      if (view.type === "channel") addMessage(m.nick, m.text, m.time);
    });

    socket.on("dm", (m) => {
      const other = m.from === myNick ? m.to : m.from;
      if (view.type === "dm" && view.id === other) {
        addMessage(m.from, m.text, m.time);
      } else if (m.from !== myNick) {
        unread[other] = (unread[other] || 0) + 1;
        renderSidebar();
      }
    });

    socket.on("system", (ev) => {
      if (view.type === "channel") {
        addSystem(ev.type === "join" ? t().joinMsg(ev.nick) : t().leaveMsg(ev.nick));
      }
      // 통화 상대가 채팅에서 나가면 통화도 종료
      if (ev.type === "leave" && callState !== "idle" && ev.nick === callPeer) {
        cleanupCall();
        addSystem(t().callEnded);
      }
    });

    socket.on("online", (names) => {
      onlineUsers = names;
      renderSidebar();
    });

    // ---- 통화 신호 ----
    socket.on("call:offer", (data) => {
      if (callState !== "idle") {
        // 이미 통화 중이면 자동으로 "통화 중" 응답
        socket.emit("call:busy", { to: data.from });
        return;
      }
      callPeer = data.from;
      callState = "ringing";
      pendingOffer = data.sdp;
      pendingIce = [];
      updateCallUi();
    });

    socket.on("call:answer", async (data) => {
      if (callState !== "calling" || data.from !== callPeer || !pc) return;
      await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
      for (const c of pendingIce) {
        try { await pc.addIceCandidate(new RTCIceCandidate(c)); } catch {}
      }
      pendingIce = [];
      callState = "incall";
      updateCallUi();
      startCallTimer();
    });

    socket.on("call:ice", async (data) => {
      if (data.from !== callPeer) return;
      if (pc && pc.remoteDescription) {
        try { await pc.addIceCandidate(new RTCIceCandidate(data.candidate)); } catch {}
      } else {
        pendingIce.push(data.candidate); // 아직 준비 전이면 보관
      }
    });

    socket.on("call:decline", (data) => {
      if (data.from !== callPeer) return;
      addSystem(t().callDeclined(callPeer));
      cleanupCall();
    });

    socket.on("call:busy", (data) => {
      if (data.from !== callPeer) return;
      addSystem(t().callBusy(callPeer));
      cleanupCall();
    });

    socket.on("call:end", (data) => {
      if (data.from !== callPeer) return;
      cleanupCall();
      addSystem(t().callEnded);
    });

    socket.on("call:unavailable", (data) => {
      if (data.from !== callPeer) return;
      addSystem(t().callOffline(callPeer));
      cleanupCall();
    });

    socket.on("connect_error", () => { $("loginError").textContent = t().errConn; });
  }

  socket.emit("join", { nick, password }, (res) => {
    if (!res.ok) {
      $("loginError").textContent =
        res.error === "bad_password" ? t().errPassword :
        res.error === "nick_taken" ? t().errNickTaken : t().errNick;
      return;
    }
    myNick = nick;
    channels = res.channels;
    view = { type: "channel", id: res.channel };
    loginEl.style.display = "none";
    chatEl.classList.add("show");
    messagesEl.innerHTML = "";
    res.history.forEach((m) => addMessage(m.nick, m.text, m.time));
    renderSidebar();
    updateTitle();
    msgInput.focus();
  });
}

/* ==================================================
   10. 메시지 보내기 (채널 or DM)
================================================== */
function send() {
  const text = msgInput.value.trim();
  if (!text) return;

  if (view.type === "channel") {
    socket.emit("message", text);
  } else {
    socket.emit("dm", { to: view.id, text }, (res) => {
      if (res && !res.delivered) addSystem(t().offlineMsg(view.id));
    });
  }
  msgInput.value = "";
  msgInput.focus();
}
$("sendBtn").onclick = send;
msgInput.addEventListener("keydown", (e) => { if (e.key === "Enter") send(); });

// 첫 화면 언어 적용
applyLang();
</script>
</body>
